<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>Exercise Guide — RepUp</title>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <link rel="icon" type="image/svg+xml" href="icon.svg"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .day-tabs{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
    .day-tabs::-webkit-scrollbar{display:none}
    .day-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .18s}
    .day-tab.on{background:var(--grad);color:#fff;border-color:transparent}
    .day-section{display:none;padding-bottom:32px}
    .day-section.on{display:block}
    .day-title{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);padding:14px 16px 6px}
    .ex-card{margin:0 14px 14px;border-radius:18px;background:var(--card);border:1px solid var(--border);overflow:hidden}
    .ex-head{padding:14px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
    .ex-name{font-size:.98rem;font-weight:700;line-height:1.2}
    .ex-sets{font-size:.72rem;font-weight:700;color:var(--accent);background:rgba(0,229,255,.15);padding:4px 10px;border-radius:20px;border:1px solid rgba(0,229,255,.28);white-space:nowrap;flex-shrink:0}
    .diagrams{display:flex;gap:6px;padding:4px 12px 8px}
    .diag-wrap{flex:1;display:flex;flex-direction:column;align-items:center}
    .diag-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);margin-bottom:4px}
    .diag-wrap svg{width:100%;max-width:120px;height:auto}
    .legend{display:flex;gap:14px;padding:0 16px 8px}
    .leg{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--t2)}
    .leg-dot{width:9px;height:9px;border-radius:50%}
    .leg-dot.p{background:var(--accent)}
    .leg-dot.s{background:var(--gold)}
    .ex-info{padding:0 16px 14px}
    .ex-info h4{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin:10px 0 4px}
    .ex-info h4:first-child{margin-top:0}
    .ex-info p{font-size:.8rem;color:var(--t2);line-height:1.55;margin:0}
    .muscle-chip{display:inline-block;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:10px;margin:0 3px 3px 0;text-transform:uppercase;letter-spacing:.05em}
    .chip-p{background:rgba(0,229,255,.16);color:var(--accent);border:1px solid rgba(0,229,255,.28)}
    .chip-s{background:rgba(245,255,0,.12);color:var(--gold);border:1px solid rgba(245,255,0,.25)}
    .muscle-row{padding:0 16px 10px;display:flex;flex-wrap:wrap}
  </style>
</head>
<body>
<div id="app">
  <header>
    <a href="./repup.html" class="dbk" style="text-decoration:none">←</a>
    <div class="logo" style="font-size:1.05rem;letter-spacing:-.3px">Exercise Guide</div>
    <div style="width:38px"></div>
  </header>

  <main id="mscroll">
    <div class="day-tabs" id="day-tabs">
      <button class="day-tab on" data-day="back">Back &amp; Biceps</button>
      <button class="day-tab" data-day="chest">Chest &amp; Triceps</button>
      <button class="day-tab" data-day="legs">Legs &amp; Shoulders</button>
      <button class="day-tab" data-day="core">Core</button>
    </div>
    <div class="day-section on" id="day-back"></div>
    <div class="day-section" id="day-chest"></div>
    <div class="day-section" id="day-legs"></div>
    <div class="day-section" id="day-core"></div>
  </main>
</div>

const PRI  = 'rgba(0,229,255,.85)';
const PSTR = 'rgba(0,229,255,1)';
const SEC  = 'rgba(245,255,0,.5)';
const SSTR = 'rgba(245,255,0,.8)';

function svg(muscles, view) {
  const map = view === 'front' ? F : B;
  const overlays = Object.entries(muscles)
    .filter(([k]) => map[k])
    .map(([k, t]) => {
      const fill   = t === 'p' ? PRI  : SEC;
      const stroke = t === 'p' ? PSTR : SSTR;
      return `<path d="${map[k]}" fill="${fill}" stroke="${stroke}" stroke-width="0.6" opacity="0.92"/>`;
    }).join('');
  return `<svg viewBox="0 0 100 285" xmlns="http://www.w3.org/2000/svg">${BODY_BASE}${overlays}</svg>`;
}

// ─── EXERCISE CARD BUILDER ────────────────────────────────────────────────────

function card(name, sets, muscles, setup, exec, chips) {
  const frontSVG = svg(muscles, 'front');
  const backSVG  = svg(muscles, 'back');
  const chipHTML = chips.map(c =>
    `<span class="muscle-chip chip-${c[0]}">${c[1]}</span>`
  ).join('');
  return `
  <div class="ex-card">
    <div class="ex-head">
      <div class="ex-name">${name}</div>
      <div class="ex-sets">${sets}</div>
    </div>
    <div class="diagrams">
      <div class="diag-wrap"><div class="diag-label">Front</div>${frontSVG}</div>
      <div class="diag-wrap"><div class="diag-label">Back</div>${backSVG}</div>
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-dot p"></div>Primary</div>
      <div class="leg"><div class="leg-dot s"></div>Secondary</div>
    </div>
    <div class="muscle-row">${chipHTML}</div>
    <div class="ex-info">
      <h4>Setup</h4><p>${setup}</p>
      <h4>Execution</h4><p>${exec}</p>
    </div>
  </div>`;
}

// chip helper: ['p','Lats'] or ['s','Biceps']
const p = n => ['p', n];
const s = n => ['s', n];

// ─── EXERCISE DEFINITIONS ────────────────────────────────────────────────────

const DAYS = {

  back: [
    card('Lat Pulldown', '3 × 8–12',
      {'lat-l':'p','lat-r':'p','rear-delt-l':'p','rear-delt-r':'p','bicep-l':'p','bicep-r':'p','rhomboid':'s','trap-m':'s','forearm-l':'s','forearm-r':'s'},

    ),
    card('Unilateral Pulldown', '3 × 8–12',

document.querySelectorAll('.day-tab').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.day-tab').forEach(b => b.classList.remove('on'));
    document.querySelectorAll('.day-section').forEach(s => s.classList.remove('on'));
    this.classList.add('on');
    document.getElementById('day-' + this.dataset.day).classList.add('on');
  });
});

// ─── RENDER ───────────────────────────────────────────────────────────────────

const LABELS = {back:'Back & Biceps',chest:'Chest & Triceps',legs:'Legs & Shoulders',core:'Core'};
Object.entries(DAYS).forEach(([key, cards]) => {
  const el = document.getElementById('day-' + key);
  el.innerHTML = `<div class="day-title">${LABELS[key]}</div>` + cards.join('');
});

    .search-wrap { padding:10px 14px 4px; position:sticky; top:0; z-index:10; background:rgba(8,8,14,.85); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }

    #search { flex:1; background:none; border:none; outline:none; color:var(--t1); font-size:.88rem; padding:11px 0; }
    #search::placeholder { color:var(--t3); }

    /* Filter tabs */
    .ftabs { display:flex; gap:6px; padding:8px 14px; overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
    .ftabs::-webkit-scrollbar { display:none; }
    .ftab { flex-shrink:0; padding:6px 14px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--t2); font-size:.75rem; font-weight:700; cursor:pointer; transition:all .15s; white-space:nowrap; }
    .ftab.on { background:var(--grad); color:#fff; border-color:transparent; }

    /* Exercise list */
    #ex-list { padding:4px 14px 0; }
    .ex-item { border-radius:16px; background:var(--card); border:1px solid var(--border); margin-bottom:10px; overflow:hidden; cursor:pointer; transition:border-color .15s; }
    .ex-item:active { border-color:var(--border2); }
    .ex-collapsed { padding:13px 14px; display:flex; align-items:center; gap:10px; }
    .ex-ico { width:40px;height:40px;border-radius:12px;background:var(--card2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0; }
    .ex-meta { flex:1; min-width:0; }
    .ex-title { font-size:.92rem; font-weight:700; margin-bottom:3px; }
    .ex-group-tag { display:inline-block; font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.08em; padding:2px 8px; border-radius:10px; background:var(--card2); color:var(--t3); margin-bottom:4px; }
    .ex-chips-row { display:flex; flex-wrap:wrap; gap:3px; }
    .chip { font-size:.6rem; font-weight:700; padding:2px 7px; border-radius:10px; text-transform:uppercase; letter-spacing:.04em; }
    .chip-p { background:rgba(0,229,255,.15); color:#00E5FF; border:1px solid rgba(0,229,255,.28); }
    .chip-s { background:rgba(245,255,0,.1); color:#F5FF00; border:1px solid rgba(245,255,0,.22); }
    .ex-arrow { font-size:1.1rem; color:var(--t3); flex-shrink:0; transition:transform .2s; }
    .ex-item.open .ex-arrow { transform:rotate(90deg); color:var(--accent); }

    /* Expanded body */
    .ex-body { display:none; padding:0 14px 14px; border-top:1px solid var(--border); }
    .ex-item.open .ex-body { display:block; }
    .diagrams { display:flex; gap:6px; padding:12px 0 8px; }
    .diag-wrap { flex:1; display:flex; flex-direction:column; align-items:center; }
    .diag-label { font-size:.58rem; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--t3); margin-bottom:4px; }
    .diag-wrap svg { width:100%; max-width:130px; height:auto; }
    .legend { display:flex; gap:14px; padding:0 0 8px; }
    .leg { display:flex; align-items:center; gap:5px; font-size:.68rem; color:var(--t2); }
    .leg-dot { width:9px; height:9px; border-radius:50%; }
    .leg-dot.p { background:#00E5FF; }
    .leg-dot.s { background:rgba(245,255,0,.65); }
    .full-chips { display:flex; flex-wrap:wrap; gap:3px; padding:0 0 10px; }
    .ex-section { margin-bottom:10px; }
    .ex-section h4 { font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--accent); margin:0 0 5px; }
    .ex-section p { font-size:.8rem; color:var(--t2); line-height:1.55; margin:0; }

    /* Empty state */
    .empty-guide { text-align:center; padding:60px 24px; color:var(--t3); }
    .empty-guide .ei { font-size:2.5rem; margin-bottom:12px; }
    .empty-guide p { font-size:.85rem; line-height:1.5; }

    /* Bottom nav */
    .gnav { position:fixed; bottom:0; left:0; right:0; display:flex; background:rgba(8,8,14,.94); backdrop-filter:blur(28px); -webkit-backdrop-filter:blur(28px); border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); z-index:50; }
    .gnav a { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:10px 4px 5px; color:var(--muted); text-decoration:none; font-size:.56rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; position:relative; transition:color .18s; }
    .gnav a svg { width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:transform .18s; }
    .gnav a.on { color:var(--accent); }
    .gnav a.on svg { transform:translateY(-1px); }
    .gnav a.on::before { content:''; position:absolute; top:0; left:50%; transform:translateX(-50%); width:28px; height:2.5px; background:var(--grad); border-radius:0 0 3px 3px; }

    /* My-exercises badge */
    .mine-badge { display:inline-block; background:var(--grad); color:#fff; font-size:.55rem; font-weight:900; padding:1px 5px; border-radius:8px; margin-left:4px; vertical-align:middle; }
  </style>
</head>

// ─── MY EXERCISES ─────────────────────────────────────────────────────────────

function getMyExerciseNames() {
  const mine = new Set();
  try {
    const profiles = JSON.parse(localStorage.getItem('ru3-profiles') || '[]');
    const active   = localStorage.getItem('ru3-active') || (profiles[0] || '');
    const key      = 'ru3-' + active.toLowerCase().replace(/\s+/g, '-');
    const state    = JSON.parse(localStorage.getItem(key) || '{"workouts":[],"log":[]}');
    (state.workouts || []).forEach(w =>
      (w.exercises || []).forEach(e => mine.add(e.name.toLowerCase().trim()))
    );
    (state.log || []).forEach(session =>
      (session.exercises || session.sets || []).forEach(e =>
        e.name && mine.add(e.name.toLowerCase().trim())
      )
    );
  } catch(_) {}
  return mine;
}

// ─── RENDER ───────────────────────────────────────────────────────────────────

let currentFilter = 'all';
let searchQuery   = '';
let myExNames     = new Set();

function chipsHTML(list, type) {
  return list.map(c => `<span class="chip chip-${type}">${c}</span>`).join('');
}

function renderItem(ex) {
  const priChips = chipsHTML(ex.primary, 'p');
  const secChips = chipsHTML(ex.secondary, 's');
  const frontSVG = makeSVG(ex.muscles, 'front');
  const backSVG  = makeSVG(ex.muscles, 'back');
  const secBlock = ex.secondary.length
    ? `<div class="legend"><div class="leg"><div class="leg-dot p"></div>Primary</div><div class="leg"><div class="leg-dot s"></div>Secondary</div></div>`
    : `<div class="legend"><div class="leg"><div class="leg-dot p"></div>Primary</div></div>`;

  return `
  <div class="ex-item" data-id="${ex.id}">
    <div class="ex-collapsed">
      <div class="ex-ico">${ex.icon}</div>
      <div class="ex-meta">
        <div class="ex-title">${ex.name}</div>
        <div class="ex-group-tag">${ex.group}</div>
        <div class="ex-chips-row">${priChips}${secChips}</div>
      </div>
      <div class="ex-arrow">›</div>
    </div>
    <div class="ex-body">
      <div class="diagrams">
        <div class="diag-wrap"><div class="diag-label">Front</div>${frontSVG}</div>
        <div class="diag-wrap"><div class="diag-label">Back</div>${backSVG}</div>
      </div>
      ${secBlock}
      <div class="full-chips">${priChips}${secChips}</div>
      <div class="ex-section">
        <h4>Setup</h4>
        <p>${ex.setup}</p>
      </div>
      <div class="ex-section">
        <h4>Execution</h4>
        <p>${ex.exec}</p>
      </div>
      <div style="font-size:.72rem;color:var(--t3);margin-top:6px">${ex.sets}</div>
    </div>
  </div>`;
}

function renderList() {
  const list = document.getElementById('ex-list');
  const q    = searchQuery.toLowerCase();

  const filtered = DB.filter(ex => {
    if (currentFilter === 'mine') {
      const match = myExNames.has(ex.name.toLowerCase()) ||
        ex.name.toLowerCase().split(/\s+/).some(w => myExNames.has(w));
      if (!match) return false;
    } else if (currentFilter !== 'all') {
      if (ex.group !== currentFilter) return false;
    }
    if (q) {
      return ex.name.toLowerCase().includes(q) ||
             ex.primary.some(m => m.toLowerCase().includes(q)) ||
             ex.secondary.some(m => m.toLowerCase().includes(q));
    }
    return true;
  });

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-guide">
      <div class="ei">${currentFilter === 'mine' ? '🏋️' : '🔍'}</div>
      <p>${currentFilter === 'mine'
        ? 'No exercises found from your workouts yet.<br>Add exercises in the main app and they\'ll show up here.'
        : 'No exercises match your search.'
      }</p>
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(renderItem).join('');

  // Expand/collapse toggle
  list.querySelectorAll('.ex-item').forEach(item => {
    item.querySelector('.ex-collapsed').addEventListener('click', () => {
      const wasOpen = item.classList.contains('open');
      list.querySelectorAll('.ex-item.open').forEach(i => i.classList.remove('open'));
      if (!wasOpen) item.classList.add('open');
    });
  });
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────

document.getElementById('search').addEventListener('input', function() {
  searchQuery = this.value.trim();
  renderList();
});

document.getElementById('ftabs').addEventListener('click', function(e) {
  const btn = e.target.closest('.ftab');
  if (!btn) return;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  currentFilter = btn.dataset.f;
  if (currentFilter === 'mine') myExNames = getMyExerciseNames();
  renderList();
});

// Initial render
myExNames = getMyExerciseNames();
renderList();
</script>
